name: Build Plugin
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install devkitPro tools
        run: |
          sudo dkp-pacman -Syu --noconfirm
          echo "" | sudo dkp-pacman -S wiiu-dev --noconfirm

      - name: Build and install WUPS
        run: |
          git clone https://github.com/wiiu-env/WiiUPluginSystem.git /tmp/WiiUPluginSystem
          cd /tmp/WiiUPluginSystem
          make install

      - name: Build plugin
        run: |
          cd /home/ubuntu/wiiu-power-led-off && make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerLedOff-Plugin
          path: "*.wps"
