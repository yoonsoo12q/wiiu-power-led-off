name: Build Plugin
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # v3 -> v4로 변경
      - name: Install WUT and WUPS
        run: |
          sudo dkp-pacman -Syu --noconfirm wiiu-dev wups
      - name: Build plugin
        run: |
          cd /home/ubuntu/wiiu-power-led-off && make
      - name: Upload artifact
        uses: actions/upload-artifact@v4  # v3 -> v4로 변경
        with:
          name: PowerLedOff-Plugin
          path: '*.wps'
