name: Build Plugin
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    container: # devkitpro/devkitppc:latest 대신 ubuntu 기반 이미지 사용
      image: ubuntu:22.04
      options: --privileged # 일부 devkitPro 설치에 필요할 수 있음
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install devkitPro pacman and dependencies
        run: |
          apt-get update && apt-get install -y wget ca-certificates gnupg
          wget -qO - https://apt.devkitpro.org/devkitpro-key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/devkitpro.gpg >/dev/null
          echo 
