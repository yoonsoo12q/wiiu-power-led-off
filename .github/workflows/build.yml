name: Build Wii U Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build plugin
        run: |
          # 필요한 패키지를 설치합니다. dkp-pacman의 일시적 오류를 대비해 재시도 로직을 포함합니다.
          for i in {1..5}; do /opt/devkitpro/pacman/bin/dkp-pacman -Syu --noconfirm wut wups libutilswut && break || sleep 15; done
          
          # 환경 변수 설정
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=/opt/devkitpro/devkitPPC
          export PATH=$DEVKITPRO/tools/bin:$PATH
          
          # 빌드 수행
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerLedOff-Plugin
          path: "*.wps"
