name: Build Plugin
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest # 다시 devkitpro/devkitppc 이미지 사용
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install devkitPro tools
        run: |
          # devkitPro pacman 데이터베이스 업데이트 및 wiiu-dev 설치
          dkp-pacman -Syu --noconfirm
          echo "" | dkp-pacman -S wiiu-dev --noconfirm

      - name: Build plugin
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=/opt/devkitpro/devkitPPC
          cd /github/workspace && make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerLedOff-Plugin
          path: "*.wps"
