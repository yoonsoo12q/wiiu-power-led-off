name: Build Wii U Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup devkitPro
        uses: devkitpro/setup-devkitpro@v1
        with:
          # 필요한 도구들을 명시적으로 지정하여 환경을 구축합니다.
          dkp-packages: |
            devkitPPC
            wut
            wups
            libutilswut

      - name: Build plugin
        run: |
          # 환경 변수 설정 후 빌드 진행
          make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITPPC: /opt/devkitpro/devkitPPC

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerLedOff-Plugin
          path: "*.wps"
